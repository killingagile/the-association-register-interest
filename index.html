<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beta Signup</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:system-ui, -apple-system, Segoe UI, Arial, sans-serif; background:#eef2ff; color:#111827; }
    .card { width:min(96%,560px); border-radius:14px; background:#fff; border:1px solid #e2e8f0; box-shadow:0 10px 24px rgba(15,23,42,.1); padding:24px; }
    h1 { margin:0 0 8px; font-size:1.6rem; }
    p.subtitle { margin:0 0 16px; color:#475569; }
    label { margin-top:10px; display:block; font-size:.9rem; color:#334155; }
    input, textarea { width:100%; margin-top:6px; border:1px solid #cbd5e1; border-radius:8px; background:#fff; padding:.65rem .7rem; font-size:.95rem; }
    button { margin-top:16px; width:100%; border:0; border-radius:8px; background:#2563eb; color:#fff; font-weight:600; padding:.75rem; cursor:pointer; }
    .status { margin-top:12px; min-height:1.2em; font-weight:600; }
    .status.success { color:#047857; }
    .status.error { color:#b91c1c; }
    .debug { margin-top:10px; padding:10px; border-left:4px solid #bfdbfe; background:#f8fafc; color:#334155; font-size:.8rem; white-space:pre-wrap; border-radius:6px; max-height:140px; overflow:auto;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Join our beta list</h1>
    <p class="subtitle">Quick and easy signup — we save your info to Google Sheets.</p>
    <form id="signupForm">
      <label for="name">Name</label>
      <input id="name" name="name" required />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <label for="company">Company</label>
      <input id="company" name="company" />
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3"></textarea>
      <button type="submit">Register interest</button>
    </form>
    <div id="status" class="status"></div>
    <div id="debug" class="debug"></div>
  </div>

  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxLGvQJSUvi3cYpUgia2SLFd1ibKksDbFJrVTWCvKeRuaW3l8IvyqVfRzNpXVoRQQh-JA/exec";
    const form = document.getElementById("signupForm");
    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");

    function log(msg) {
      debugEl.textContent += `${new Date().toISOString()} ${msg}\n`;
      console.log(msg);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.className = "status";
      statusEl.textContent = "Sending...";
      debugEl.textContent = "";

      const data = Object.fromEntries(new FormData(form).entries());
      const payload = new URLSearchParams(data).toString();

      log("POST " + scriptUrl);
      log("Form payload: " + JSON.stringify(data));

      try {
        const response = await fetch(scriptUrl, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
          body: payload,
        });

        log("HTTP status: " + response.status);
        const text = await response.text();
        log("Response text: " + text);

        if (!response.ok) {
          statusEl.className = "status error";
          statusEl.textContent = `Error ${response.status}: ${response.statusText}`;
          return;
        }

        let result;
        try {
          result = JSON.parse(text);
        } catch {
          result = null;
        }

        if (result && result.success) {
          statusEl.className = "status success";
          statusEl.textContent = "Saved! You’re on the beta list.";
          form.reset();
        } else if (result) {
          statusEl.className = "status error";
          statusEl.textContent = "Save failed: " + (result.error || "Unknown");
        } else {
          statusEl.className = "status success";
          statusEl.textContent = "Saved! (no JSON response)";
        }
      } catch (err) {
        log("Fetch exception: " + err);
        statusEl.className = "status error";
        statusEl.textContent = "Network error; please try again.";
      }
    });
  </script>
</body>
</html>
