<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beta Signup</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:system-ui, -apple-system, Segoe UI, sans-serif; background:#f0f4f8; color:#111; }
    .card { width:min(95%, 540px); background:#fff; border-radius:14px; border:1px solid #e2e8f0; box-shadow:0 10px 28px rgba(15,23,42,.08); padding:24px; }
    h1 { margin:0 0 8px; font-size:1.6rem; }
    p { margin:0 0 16px; color:#475569; }
    label { display:block; margin-top:10px; font-size:.9rem; color:#334155; }
    input, textarea { width:100%; border:1px solid #cbd5e1; border-radius:8px; background:#fff; padding:.6rem .7rem; margin-top:4px; font-size:.94rem; }
    button { margin-top:14px; background:#1d4ed8; color:#fff; border:0; border-radius:8px; padding:.7rem .95rem; font-weight:600; cursor:pointer; width:100%; }
    .status { margin-top:14px; min-height:1.2em; font-size:.94rem; font-weight:600; }
    .status.error { color:#b91c1c; }
    .status.success { color:#047857; }
    .debug { margin-top:8px; font-size:.8rem; color:#475569; white-space:pre-wrap; background:#f8fafc; border-left:3px solid #93c5fd; border-radius:6px; padding:8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Join our beta list</h1>
    <p>We store your details in Google Sheets and notify you first.</p>
    <form id="interestForm">
      <label for="name">Name</label>
      <input id="name" name="name" required>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
      <label for="company">Company</label>
      <input id="company" name="company">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3"></textarea>
      <button type="submit">Register interest</button>
    </form>
    <div id="status" class="status"></div>
    <div id="debug" class="debug"></div>
  </div>

  <script>
    // TODO: Replace this with your actual Google Apps Script web app URL
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyJegwyW3YpmYC0oCxrqBEeR9x3IuzohZx5rb-bjxMmCnZr3tUoHQvQAN7SmtXAP6d0KQ/exec";
    const form = document.getElementById('interestForm');
    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('debug');

    function logDebug(msg) {
      debugEl.textContent += msg + '\n';
      console.log(msg);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = 'Sending...';
      const data = Object.fromEntries(new FormData(form).entries());
      logDebug('POST URL: ' + scriptUrl);
      logDebug('Payload: ' + JSON.stringify(data));

      try {
        const formBody = new URLSearchParams(data).toString();
      const response = await fetch(scriptUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: formBody,
        });
      logDebug('Fetch returned status ' + response.status);

      if (!response.ok) {
        const text = await response.text();
        logDebug('Non-OK body: ' + text);
        statusEl.className = 'status error';
        statusEl.textContent = `Server error ${response.status}: ${response.statusText}`;
        return;
      }

      const text = await response.text();
      logDebug('Response text: ' + text);
      let result;
      try { result = JSON.parse(text); } catch (err) { result = null; }
      if (result && result.success) {
        statusEl.className = 'status success';
        statusEl.textContent = 'Saved! You are on the beta list.';
        form.reset();
      } else if (result && result.error) {
        statusEl.className = 'status error';
        statusEl.textContent = 'Failed: ' + result.error;
      } else {
        statusEl.className = 'status success';
        statusEl.textContent = 'Saved! (no JSON response)';
      }
      } catch (err) {
        logDebug('Fetch exception: ' + err);
        statusEl.className = 'status error';
        statusEl.textContent = 'Network error; try again.';
      }
    });
  </script>
</body>
</html>
