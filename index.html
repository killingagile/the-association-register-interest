<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Join Beta Waitlist</title>
  <style>
    body {font-family: system-ui, -apple-system, Segoe UI, Arial; background:#f7fafc; margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh;}
    .card {max-width:520px; width:100%; background:#fff; border-radius:16px; box-shadow:0 10px 34px rgba(0,0,0,.1); padding:26px;}
    h1 {margin-top:0; color:#111827;}
    label {display:block; margin:.65rem 0 0.15rem; color:#334155;}
    input, textarea {width:100%; border:1px solid #d1d5db; border-radius:10px; padding:.65rem; font-size:0.95rem;}
    button {margin-top:1rem; background:#2563eb; color:#fff; border:0; border-radius:10px; padding:.7rem 1rem; cursor:pointer;}
    .status {margin-top:0.8rem; font-weight:600;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Register your interest</h1>
    <p>Join our beta list and get early access.</p>
    <form id="signup">
      <label>Name</label><input name="name" required>
      <label>Email</label><input name="email" type="email" required>
      <label>Company</label><input name="company">
      <label>Notes</label><textarea name="notes" rows="3"></textarea>
      <button type="submit">Save my spot</button>
    </form>
    <p id="status" class="status"></p>
  </div>
  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbxLGvQJSUvi3cYpUgia2SLFd1ibKksDbFJrVTWCvKeRuaW3l8IvyqVfRzNpXVoRQQh-JA/exec";
    const form = document.getElementById("signup");
    const status = document.getElementById("status");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      status.textContent = "Saving...";
      const data = Object.fromEntries(new FormData(form).entries());
      try {
        const res = await fetch(scriptUrl, {
          method: "POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          status.textContent = "Thanks! You’re on the list.";
          form.reset();
        } else {
          status.textContent = "Could not save yet; please try again.";
          console.error(result);
        }
      } catch (err) {
        status.textContent = "Network error; try again.";
        console.error(err);
      }
    });
  </script>
</body>
</html>
